services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=parkir
      - DB_USERNAME=root
      - DB_PASSWORD=123
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=file
      - CACHE_STORE=database
    depends_on:
      - db
  web:
    image: nginx:alpine
    ports:
      - "8000-8002:80"
    volumes:
      - .:/var/www/html
      - ./nginx-container.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - db
    
  db:
    image: mariadb:10.11
    restart: unless-stopped
    container_name: parkir_db
    environment:
      - MYSQL_DATABASES=parkir
      - MYSQL_ROOT_PASSWORD=123
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: